<!-- TopAppBar Shared Component -->
<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant flat no shadows transition-colors duration-200">
<div class="flex justify-between items-center px-margin-mobile h-14 w-full max-w-[768px] mx-auto">
<div class="flex items-center gap-md">
<button class="text-on-surface-variant hover:bg-surface-container-high p-xs rounded-full flex items-center justify-center transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Tala</span>
</div>
<div class="flex items-center gap-sm text-on-surface-variant">
<button class="hover:bg-surface-container-high p-xs rounded-full transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
<button class="hover:bg-surface-container-high p-xs rounded-full transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="filter_list">filter_list</span>
</button>
<button class="hover:bg-surface-container-high p-xs rounded-full transition-colors duration-200 ml-sm">
<div class="w-8 h-8 rounded-full bg-surface-container-highest border border-outline-variant flex items-center justify-center overflow-hidden">
<span class="font-label-sm text-label-sm text-on-surface-variant">al</span>
</div>
</button>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col px-margin-mobile py-xl w-full max-w-[768px] mx-auto overflow-y-auto">
<!-- Status Segmented Control -->
<div class="flex gap-sm overflow-x-auto pb-sm mb-xl snap-x scrollbar-hide border-b border-outline-variant">
<button class="snap-start shrink-0 px-md py-sm bg-surface-bright border border-outline-variant rounded-full flex items-center gap-xs font-label-md text-label-md text-primary">
<div class="w-2 h-2 rounded-full bg-tertiary-fixed-dim"></div>
                new
            </button>
<button class="snap-start shrink-0 px-md py-sm hover:bg-surface-container-low rounded-full flex items-center gap-xs font-label-md text-label-md text-on-surface-variant transition-colors">
<div class="w-2 h-2 rounded-full bg-secondary-container"></div>
                in_progress
            </button>
<button class="snap-start shrink-0 px-md py-sm hover:bg-surface-container-low rounded-full flex items-center gap-xs font-label-md text-label-md text-on-surface-variant transition-colors">
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
                completed
            </button>
<button class="snap-start shrink-0 px-md py-sm hover:bg-surface-container-low rounded-full flex items-center gap-xs font-label-md text-label-md text-on-surface-variant transition-colors">
<div class="w-2 h-2 rounded-full bg-error-container"></div>
                canceled
            </button>
</div>

<div class="flex-1 flex flex-col items-center justify-center text-center mt-xl mb-xl px-lg">
<div class="w-16 h-16 bg-surface-container rounded-full flex items-center justify-center mb-xl border border-outline-variant">
<span class="material-symbols-outlined text-outline text-3xl" data-icon="inbox">inbox</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-md">No issues yet</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mb-xl">
                Create the first issue to start coordinating work.
            </p>
<button class="bg-primary text-on-primary font-label-md text-label-md px-xl py-md rounded flex items-center gap-sm hover:bg-inverse-surface transition-colors duration-200">
<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
                Create issue
            </button>
</div>

<li class="flex items-start gap-md">
<span class="material-symbols-outlined text-outline text-[16px] mt-0.5" data-icon="markdown">markdown</span>

</li>
<li class="flex items-start gap-md">
<span class="material-symbols-outlined text-outline text-[16px] mt-0.5" data-icon="block">block</span>
<span class="font-body-md text-body-md text-on-surface">Dependency blockers</span>
</li>
<li class="flex items-start gap-md">
<span class="material-symbols-outlined text-outline text-[16px] mt-0.5" data-icon="account_tree">account_tree</span>

</li>
<li class="flex items-start gap-md">
<span class="material-symbols-outlined text-outline text-[16px] mt-0.5" data-icon="chat_bubble_outline">chat_bubble_outline</span>

</li>
</ul>
