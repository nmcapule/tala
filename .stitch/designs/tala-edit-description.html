<style type="text/tailwindcss">
        @layer utilities {
            .font-variation-fill {
                font-variation-settings: 'FILL' 1;
            }
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col w-full max-w-[768px] mx-auto overflow-x-hidden pb-[100px]">
<!-- TopAppBar (Synthesized Header) -->
<header class="bg-surface sticky top-0 w-full z-40 border-b border-outline-variant flex flex-col px-margin-mobile py-sm">
<div class="flex items-center justify-between mb-xs">
<button class="text-on-surface-variant hover:bg-surface-container-low transition-colors active:opacity-80 p-xs -ml-xs rounded">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-center flex-1">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Edit description</h1>
<p class="font-label-md text-label-md text-on-surface-variant">Add MCP issue search</p>
</div>
<div class="w-[32px]"></div> <!-- Spacer for balance -->
</div>
<!-- Segmented Control (Tabs) -->
<div class="bg-surface-container-high rounded p-[2px] flex w-full mt-sm">
<button class="flex-1 py-[6px] text-center rounded bg-surface-bright shadow-[0_1px_2px_rgba(0,0,0,0.05)] text-surface-indigo font-label-md text-label-md transition-all active:scale-[0.98]">
                Source
            </button>
<button class="flex-1 py-[6px] text-center rounded text-on-surface-variant font-label-md text-label-md hover:bg-surface-container-highest transition-all active:scale-[0.98]">
                Preview
            </button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col p-margin-mobile gap-lg">
<!-- Editor Area -->
<div class="flex flex-col gap-xs flex-1">
<label class="sr-only" for="markdown-editor">Markdown Source</label>
<textarea class="w-full bg-surface-bright border border-outline-variant rounded p-md font-mono text-sm leading-relaxed text-on-surface focus:ring-1 focus:ring-surface-indigo focus:border-surface-indigo resize-none min-h-[240px] shadow-sm" id="markdown-editor" spellcheck="false">Expose issue search to agents via a tool.

- Preserve Markdown source
- Return compact JSON for agents</textarea>
<p class="font-label-sm text-label-sm text-on-surface-variant text-right px-xs">Markdown source is stored unchanged</p>
</div>
<!-- Sanitized Preview Card -->
<div class="flex flex-col gap-sm mt-md">
<div class="flex items-center justify-between px-xs">
<h2 class="font-label-md text-label-md text-on-surface-variant">Sanitized preview</h2>
<div class="flex items-center gap-[4px] bg-secondary-container text-on-secondary-container px-xs py-[2px] rounded-sm">
<span class="material-symbols-outlined text-[14px]">shield</span>
<span class="font-label-sm text-label-sm uppercase">Sanitized</span>
</div>
</div>
<div class="bg-surface-container-low border border-outline-variant rounded p-md text-on-surface font-body-lg">
<p class="mb-sm">Expose issue search to agents via a tool.</p>
<ul class="list-disc pl-lg space-y-[4px]">
<li>Preserve Markdown source</li>
<li>Return compact JSON for agents</li>
</ul>
</div>
</div>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-outline-variant px-margin-mobile py-md pb-safe z-50 flex justify-end gap-sm items-center shadow-[0_-4px_12px_rgba(25,23,20,0.04)]">
<button class="px-lg py-sm rounded border border-outline-warm text-on-surface font-label-md text-label-md hover:bg-surface-container-low transition-colors active:scale-[0.98]">
            Cancel
        </button>
<button class="px-lg py-sm rounded bg-primary text-on-primary font-label-md text-label-md hover:bg-primary-container transition-colors active:scale-[0.98]">
            Save description
        </button>
</div>
</body></html>
