<body class="min-h-screen flex flex-col md:items-center">
<!-- TopAppBar JSON Component implementation -->
<header class="w-full sticky top-0 z-50 border-b border-outline-variant dark:border-outline-variant bg-surface dark:bg-surface flex items-center justify-between px-margin-mobile h-14 md:max-w-[768px] mx-auto">
<div class="flex items-center gap-sm">
<button aria-label="Go back" class="w-8 h-8 flex items-center justify-center rounded hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors active:opacity-80 text-on-surface-variant dark:text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="flex flex-col">
<h1 class="font-headline-md text-headline-md-mobile dark:text-headline-md-mobile text-primary dark:text-primary-fixed tracking-tight m-0 p-0 leading-none">Create issue</h1>
<span class="font-label-sm text-label-sm text-on-surface-variant mt-[2px]">as alex</span>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 w-full md:max-w-[768px] px-margin-mobile py-lg pb-32 overflow-y-auto">
<form class="flex flex-col gap-lg" id="create-issue-form">
<!-- Title Input (Required with Error State) -->
<div class="flex flex-col gap-base">
<input class="w-full bg-surface-bright font-headline-md text-headline-md-mobile text-primary placeholder-on-surface-variant/50 border border-error rounded px-md py-sm focus:outline-none focus:border-error transition-colors" id="issue-title" placeholder="Issue title" type="text" value=""/>
<span class="font-label-sm text-label-sm text-error flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]">error</span> Title is required
                </span>
</div>
<!-- Priority Selector -->
<div class="flex flex-col gap-sm mt-sm">
<label class="font-label-md text-label-md text-on-surface-variant">Priority</label>
<div class="flex rounded border border-outline-variant overflow-hidden bg-surface-container-low h-10 w-full" role="radiogroup">
<label class="flex-1 cursor-pointer border-r border-outline-variant last:border-r-0 relative hover:bg-surface-container-high transition-colors">
<input class="sr-only peer" name="priority" type="radio" value="P0"/>
<div class="w-full h-full flex items-center justify-center font-label-md text-label-md text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary transition-colors">
                            P0
                        </div>
</label>
<label class="flex-1 cursor-pointer border-r border-outline-variant last:border-r-0 relative hover:bg-surface-container-high transition-colors">
<input class="sr-only peer" name="priority" type="radio" value="P1"/>
<div class="w-full h-full flex items-center justify-center font-label-md text-label-md text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary transition-colors">
                            P1
                        </div>
</label>
<label class="flex-1 cursor-pointer border-r border-outline-variant last:border-r-0 relative hover:bg-surface-container-high transition-colors">
<input checked="" class="sr-only peer" name="priority" type="radio" value="P2"/>
<div class="w-full h-full flex items-center justify-center font-label-md text-label-md text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary transition-colors">
                            P2
                        </div>
</label>
<label class="flex-1 cursor-pointer border-r border-outline-variant last:border-r-0 relative hover:bg-surface-container-high transition-colors">
<input class="sr-only peer" name="priority" type="radio" value="P3"/>
<div class="w-full h-full flex items-center justify-center font-label-md text-label-md text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary transition-colors">
                            P3
                        </div>
</label>
<label class="flex-1 cursor-pointer border-r border-outline-variant last:border-r-0 relative hover:bg-surface-container-high transition-colors">
<input class="sr-only peer" name="priority" type="radio" value="P4"/>
<div class="w-full h-full flex items-center justify-center font-label-md text-label-md text-on-surface-variant peer-checked:bg-primary peer-checked:text-on-primary transition-colors">
                            P4
                        </div>
</label>
</div>
</div>
<div class="h-px w-full bg-outline-variant my-base"></div>
<!-- Description Field -->
<div class="flex flex-col gap-base focus-ring bg-surface-bright border border-outline-variant rounded p-xs pb-0">
<div class="flex items-center justify-between px-xs pt-xs">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs" for="issue-description">
<span class="material-symbols-outlined text-[16px]">edit_document</span> Markdown source
                    </label>
</div>
<textarea class="w-full bg-transparent font-body-md text-body-md text-primary placeholder-on-surface-variant/50 border-none resize-none focus:ring-0 p-sm pb-md" id="issue-description" placeholder="Describe the issue..." rows="6"></textarea>
</div>
<div class="h-px w-full bg-outline-variant my-base"></div>
<!-- Attributes Section (Dense layout) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Assignee -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant">Assignee</label>
<button class="flex items-center justify-between w-full bg-surface-bright border border-outline-variant rounded px-md py-sm hover:bg-surface-container-low transition-colors text-left focus:outline-none focus:border-primary" type="button">
<span class="font-body-md text-body-md text-on-surface-variant">Select assignee</span>
<span class="material-symbols-outlined text-on-surface-variant text-[18px]">person_add</span>
</button>
</div>
<!-- Parent Issue -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant">Parent Issue</label>
<button class="flex items-center justify-between w-full bg-surface-bright border border-outline-variant rounded px-md py-sm hover:bg-surface-container-low transition-colors text-left focus:outline-none focus:border-primary" type="button">
<span class="font-body-md text-body-md text-on-surface-variant">None</span>
<span class="material-symbols-outlined text-on-surface-variant text-[18px]">account_tree</span>
</button>
</div>
<!-- Tags -->
<div class="flex flex-col gap-base md:col-span-2">
<label class="font-label-md text-label-md text-on-surface-variant">Tags</label>
<div class="flex flex-wrap gap-sm items-center bg-surface-bright border border-outline-variant rounded p-sm focus-ring min-h-[44px]">
<!-- Sample Chips -->
<div class="flex items-center gap-xs bg-surface-container-high rounded-full px-sm py-[2px] border border-outline-variant">
<span class="font-label-sm text-label-sm text-primary">mcp</span>
<button class="text-on-surface-variant hover:text-error transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
<div class="flex items-center gap-xs bg-surface-container-high rounded-full px-sm py-[2px] border border-outline-variant">
<span class="font-label-sm text-label-sm text-primary">api</span>
<button class="text-on-surface-variant hover:text-error transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
<input class="flex-1 bg-transparent border-none focus:ring-0 font-body-md text-body-md text-primary placeholder-on-surface-variant/50 min-w-[100px] p-0 h-6" placeholder="Add tag..." type="text"/>
</div>
</div>
</div>
</form>
</main>
<!-- Fixed Footer Actions -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-outline-variant shadow-[0_-4px_12px_rgba(25,23,20,0.08)] z-40">
<div class="flex items-center justify-end gap-md px-margin-mobile py-md md:max-w-[768px] mx-auto pb-safe">
<button class="font-label-md text-label-md text-primary bg-transparent border border-outline-warm rounded px-lg py-sm hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 h-10" type="button">
                Cancel
            </button>
<!-- Primary Button (Disabled state as requested due to empty/invalid title) -->
<button class="font-label-md text-label-md text-on-primary bg-primary rounded px-lg py-sm opacity-50 cursor-not-allowed h-10" disabled="" type="button">
                Create issue
            </button>
</div>
</div>
<script>
        // Simple script to toggle input state for demo purposes
        document.addEventListener('DOMContentLoaded', () => {
            const titleInput = document.getElementById('issue-title');
            const submitBtn = document.querySelector('button[disabled]');
            const errorMsg = titleInput.nextElementSibling;
            
            titleInput.addEventListener('input', (e) => {
                if (e.target.value.trim().length > 0) {
                    titleInput.classList.remove('border-error', 'focus:border-error');
                    titleInput.classList.add('border-outline-variant', 'focus:border-primary');
                    errorMsg.style.visibility = 'hidden';
                    submitBtn.removeAttribute('disabled');
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    submitBtn.classList.add('hover:bg-primary/90', 'active:scale-[0.98]', 'transition-all');
                } else {
                    titleInput.classList.add('border-error', 'focus:border-error');
                    titleInput.classList.remove('border-outline-variant', 'focus:border-primary');
                    errorMsg.style.visibility = 'visible';
                    submitBtn.setAttribute('disabled', 'true');
                    submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    submitBtn.classList.remove('hover:bg-primary/90', 'active:scale-[0.98]', 'transition-all');
                }
            });
        });
    </script>
</body></html>
